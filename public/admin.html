<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — HeartConnect</title>
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--cream:#fffdfd;--blush:#f9eef3;--pink:#f2a0bb;--pink-light:#f6c9d8;--ink:#3d2c3b;--pink-deep:#e589a8;}
  *{box-sizing:border-box;}
  body{margin:0;font-family:'Quicksand',sans-serif;background:var(--cream);color:var(--ink);}
  h1{font-family:'Dancing Script',cursive;font-size:30px;margin:0;}
  header{display:flex;justify-content:space-between;align-items:center;padding:16px 24px;border-bottom:1px solid var(--pink-light);background:#fff;position:sticky;top:0;z-index:10;}
  button{font-family:inherit;cursor:pointer;border:none;border-radius:999px;padding:8px 16px;font-weight:600;font-size:13px;}
  .btn-primary{background:var(--pink);color:#fff;}
  .btn-primary:hover{background:var(--pink-deep);}
  .btn-ghost{background:var(--blush);color:var(--ink);}
  table{width:100%;border-collapse:collapse;background:#fff;border-radius:14px;overflow:hidden;}
  th,td{padding:10px 12px;text-align:left;font-size:13px;border-bottom:1px solid var(--blush);}
  th{background:var(--blush);color:#7a6273;font-weight:700;}
  .tabs{display:flex;gap:8px;padding:16px 24px 0;flex-wrap:wrap;}
  .tabs button{background:var(--blush);color:var(--ink);}
  .tabs button.active{background:var(--pink);color:#fff;}
  .panel{display:none;padding:20px 24px 50px;max-width:1100px;margin:0 auto;}
  .panel.active{display:block;}
  .login-wrap{max-width:360px;margin:80px auto;text-align:center;}
  .login-wrap input{width:100%;padding:10px 14px;margin:8px 0;border-radius:12px;border:1.5px solid var(--pink-light);}
  .login-wrap button{width:100%;margin-top:10px;padding:11px;}
  .error{color:#c0446a;font-size:13px;}
  .pill{padding:3px 10px;border-radius:999px;font-size:12px;font-weight:700;}
  .pill.pending{background:#fdeadb;color:#a8681a;}
  .pill.approved{background:#e3f5e8;color:#1f8a45;}
  .pill.resolved{background:#e3f5e8;color:#1f8a45;}
  textarea, input.notice-input{width:100%;padding:10px;border-radius:12px;border:1.5px solid var(--pink-light);font-family:inherit;}
</style>
</head>
<body>

<div class="login-wrap" id="loginWrap">
  <h1>HeartConnect Admin</h1>
  <input id="adminUser" placeholder="Username" value="admin">
  <input id="adminPass" type="password" placeholder="Password">
  <button class="btn-primary" onclick="adminLogin()">Log in</button>
  <p class="error" id="loginError"></p>
</div>

<div id="dashboard" style="display:none;">
  <header>
    <h1>HeartConnect Admin</h1>
    <button class="btn-ghost" onclick="logout()">Log out</button>
  </header>
  <div class="tabs">
    <button data-tab="users" class="active">Users</button>
    <button data-tab="reports">Reports</button>
    <button data-tab="chats">Chats</button>
    <button data-tab="security">Security</button>
    <button data-tab="notices">Notices</button>
    <button data-tab="deletions">Deletions</button>
  </div>

  <div class="panel active" id="panel-users">
    <p><button class="btn-primary" onclick="exportUsers()">⬇ Export new users (JSON)</button></p>
    <table><thead><tr><th>Username</th><th>Role</th><th>Status</th><th>Has profile</th><th>Actions</th></tr></thead>
    <tbody id="usersBody"></tbody></table>
  </div>

  <div class="panel" id="panel-reports">
    <table><thead><tr><th>Profile</th><th>Reported by</th><th>Reason</th><th>Status</th><th>Actions</th></tr></thead>
    <tbody id="reportsBody"></tbody></table>
  </div>

  <div class="panel" id="panel-chats">
    <table><thead><tr><th>User</th><th>Status</th><th>Last message</th><th>Actions</th></tr></thead>
    <tbody id="chatsBody"></tbody></table>
  </div>

  <div class="panel" id="panel-security">
    <table><thead><tr><th>Username</th><th>Risk score</th><th>Flags</th><th>Verified</th><th>Last location</th><th>History count</th></tr></thead>
    <tbody id="securityBody"></tbody></table>
    <p><button class="btn-ghost" onclick="loadTab('security')">↻ Refresh</button></p>
  </div>

  <div class="panel" id="panel-notices">
    <div style="max-width:500px;margin-bottom:20px;">
      <textarea id="noticeMsg" rows="3" placeholder="Notice message…"></textarea>
      <label style="display:block;margin:8px 0;font-size:13px;"><input type="checkbox" id="noticeActive"> Active</label>
      <button class="btn-primary" onclick="createNotice()">Post notice</button>
    </div>
    <table><thead><tr><th>Message</th><th>Active</th></tr></thead>
    <tbody id="noticesBody"></tbody></table>
  </div>

  <div class="panel" id="panel-deletions">
    <table><thead><tr><th>Username</th><th>Reason</th><th>Deleted at</th></tr></thead>
    <tbody id="deletionsBody"></tbody></table>
  </div>
</div>

<script>
let TOKEN = localStorage.getItem('hc_admin_token') || '';

function api(path, opts = {}) {
  return fetch('/api' + path, {
    ...opts,
    headers: {
      'Content-Type': 'application/json',
      Authorization: 'Bearer ' + TOKEN,
      ...(opts.headers || {}),
    },
  }).then(async (r) => {
    const data = await r.json().catch(() => ({}));
    if (!r.ok) throw new Error(data.error || 'Request failed');
    return data;
  });
}

async function adminLogin() {
  const username = document.getElementById('adminUser').value;
  const password = document.getElementById('adminPass').value;
  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error);
    if (data.user.role !== 'admin') throw new Error('This account is not an admin');
    TOKEN = data.token;
    localStorage.setItem('hc_admin_token', TOKEN);
    document.getElementById('loginWrap').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    loadTab('users');
  } catch (err) {
    document.getElementById('loginError').textContent = err.message;
  }
}

function logout() {
  localStorage.removeItem('hc_admin_token');
  TOKEN = '';
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('loginWrap').style.display = 'block';
}

document.querySelectorAll('.tabs button').forEach((btn) => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tabs button').forEach((b) => b.classList.remove('active'));
    document.querySelectorAll('.panel').forEach((p) => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('panel-' + btn.dataset.tab).classList.add('active');
    loadTab(btn.dataset.tab);
  });
});

async function loadTab(tab) {
  try {
    if (tab === 'users') {
      const users = await api('/admin/users');
      document.getElementById('usersBody').innerHTML = users.map(u => `
        <tr>
          <td>${u.username}</td>
          <td>${u.role}</td>
          <td><span class="pill ${u.approved ? 'approved' : 'pending'}">${u.approved ? 'Approved' : 'Pending'}</span></td>
          <td>${u.hasProfile ? 'Yes' : 'No'}</td>
          <td>
            ${!u.approved ? `<button class="btn-primary" onclick="approveUser('${u.id}')">Approve</button>` : ''}
            ${u.role !== 'admin' ? `<button class="btn-ghost" onclick="promoteUser('${u.id}')">Promote</button>` : ''}
            <button class="btn-ghost" onclick="deleteUser('${u.id}')">Delete</button>
          </td>
        </tr>`).join('');
    }
    if (tab === 'reports') {
      const reports = await api('/admin/reports');
      document.getElementById('reportsBody').innerHTML = reports.map(r => `
        <tr>
          <td>${r.profileName}</td>
          <td>${r.reportedBy}</td>
          <td>${r.reason}</td>
          <td><span class="pill ${r.status === 'resolved' ? 'resolved' : 'pending'}">${r.status}</span></td>
          <td>${r.status === 'pending' ? `<button class="btn-primary" onclick="resolveReport('${r.id}')">Resolve</button>` : ''}</td>
        </tr>`).join('');
    }
    if (tab === 'chats') {
      const chats = await api('/admin/chats');
      document.getElementById('chatsBody').innerHTML = chats.map(c => `
        <tr>
          <td>${c.user}</td>
          <td><span class="pill ${c.status === 'resolved' ? 'resolved' : 'pending'}">${c.status}</span></td>
          <td>${(c.lastMessage || '').slice(0, 60)}</td>
          <td>
            <button class="btn-ghost" onclick="replyChat('${c.id}')">Reply</button>
            ${c.status !== 'resolved' ? `<button class="btn-ghost" onclick="resolveChat('${c.id}')">Resolve</button>` : ''}
          </td>
        </tr>`).join('');
    }
    if (tab === 'security') {
      const sec = await api('/admin/security');
      document.getElementById('securityBody').innerHTML = sec.map(s => `
        <tr>
          <td>${s.username}</td>
          <td>${s.riskScore}</td>
          <td>${(s.riskFlags || []).join(', ') || '—'}</td>
          <td>${s.verified ? '✓' : '—'}</td>
          <td>${s.lastLocation ? `${s.lastLocation.city || ''} ${s.lastLocation.country || ''}`.trim() : '—'}</td>
          <td>${s.locationHistoryCount}</td>
        </tr>`).join('');
    }
    if (tab === 'notices') {
      const notices = await api('/admin/notices');
      document.getElementById('noticesBody').innerHTML = notices.map(n => `
        <tr><td>${n.message}</td><td>${n.active ? 'Yes' : 'No'}</td></tr>`).join('');
    }
    if (tab === 'deletions') {
      const deletions = await api('/admin/deletions');
      document.getElementById('deletionsBody').innerHTML = deletions.map(d => `
        <tr><td>${d.username}</td><td>${d.reason || '—'}</td><td>${new Date(d.deletedAt).toLocaleString()}</td></tr>`).join('');
    }
  } catch (err) {
    alert(err.message);
  }
}

async function approveUser(id) { await api(`/admin/users/${id}/approve`, { method: 'POST' }); loadTab('users'); }
async function promoteUser(id) { await api(`/admin/users/${id}/promote`, { method: 'POST' }); loadTab('users'); }
async function deleteUser(id) {
  if (!confirm('Delete this user and all their data?')) return;
  await api(`/admin/users/${id}`, { method: 'DELETE', body: JSON.stringify({ reason: 'Removed by admin' }) });
  loadTab('users');
}
async function resolveReport(id) { await api(`/admin/reports/${id}/resolve`, { method: 'POST' }); loadTab('reports'); }
async function replyChat(id) {
  const text = prompt('Reply message:');
  if (!text) return;
  await api(`/admin/chats/${id}/reply`, { method: 'POST', body: JSON.stringify({ text }) });
  loadTab('chats');
}
async function resolveChat(id) { await api(`/admin/chats/${id}/resolve`, { method: 'POST' }); loadTab('chats'); }
async function createNotice() {
  const message = document.getElementById('noticeMsg').value;
  const active = document.getElementById('noticeActive').checked;
  if (!message.trim()) return;
  await api('/admin/notices', { method: 'POST', body: JSON.stringify({ message, active }) });
  document.getElementById('noticeMsg').value = '';
  loadTab('notices');
}
async function exportUsers() {
  const res = await fetch('/api/admin/export', { headers: { Authorization: 'Bearer ' + TOKEN } });
  const blob = await res.blob();
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'new-users-export.json'; a.click();
}

if (TOKEN) {
  document.getElementById('loginWrap').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
  loadTab('users');
}
</script>
</body>
</html>
