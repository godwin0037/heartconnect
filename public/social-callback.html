<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Verification complete — HeartConnect</title>
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
<style>
  body{font-family:'Quicksand',sans-serif;background:#fffdfd;color:#3d2c3b;display:flex;align-items:center;justify-content:center;height:100vh;margin:0;text-align:center;}
  h1{font-family:'Dancing Script',cursive;font-size:36px;}
  a{color:#e589a8;font-weight:700;}
</style>
</head>
<body>
  <div>
    <h1>You're verified! 💕</h1>
    <p id="detail">Your social account has been linked.</p>
    <p><a href="/">Return to HeartConnect</a></p>
  </div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const platform = params.get('platform');
    if (platform) {
      document.getElementById('detail').textContent = `Your ${platform} account has been linked and verified.`;
    }
  </script>
</body>
</html>
